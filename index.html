<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEUN | Luxury Perfumes</title>
    <meta name="description" content="SEUN — Faire tourner les tetês. Premium perfume collection featuring Jo Malone, Prada Milano, and Zara fragrances.">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ======= NAVBAR ======= -->
    <nav class="navbar" id="navbar">
        <a href="/" class="nav-logo">SEUN</a>

        <div class="nav-search" id="nav-search">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="M21 21l-4.35-4.35"></path>
            </svg>
            <input type="text" placeholder="SEARCH PRODUCTS" id="search-input">
        </div>

        <div class="nav-actions">
            <button class="nav-icon-btn" id="cart-btn" aria-label="Shopping cart">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 01-8 0"></path>
                </svg>
            </button>
            <button class="nav-icon-btn menu-toggle" id="menu-toggle" aria-label="Menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
    </nav>

    <!-- ======= HERO SECTION ======= -->
    <section class="hero" id="hero">
        <div class="hero-content">
            <h1 class="hero-title">FAIRE TOURNER LES TETÊS</h1>
            <p class="hero-subtitle">BE THE REASON FOR EVERY TURN</p>
            <a href="#best-sellers" class="shop-now-btn">SHOP NOW</a>
        </div>
        <div class="hero-image">
            <img src="model picture 1.png" alt="Model holding luxury perfume" loading="eager">
        </div>
    </section>

    <!-- ======= BEST SELLERS ======= -->
    <section class="products-section" id="best-sellers">
        <h2 class="section-title">BEST SELLER</h2>
        <div class="products-grid">

            <div class="product-card" id="product-1">
                <div class="product-image">
                    <img src="jo malone perfume 1.png" alt="Jo Malone Perfume" loading="lazy">
                </div>
                <div class="product-info">
                    <p class="product-name">Jo Malone Perfume</p>
                    <p class="product-price">₦24,500</p>
                </div>
                <button class="add-to-cart-btn">ADD TO CART</button>
            </div>

            <div class="product-card" id="product-2">
                <div class="product-image">
                    <img src="Prada milano 3 1.png" alt="Prada Milano" loading="lazy">
                </div>
                <div class="product-info">
                    <p class="product-name">Prada Milano</p>
                    <p class="product-price">₦28,000</p>
                </div>
                <button class="add-to-cart-btn">ADD TO CART</button>
            </div>

            <div class="product-card" id="product-3">
                <div class="product-image">
                    <img src="zara perfume 2 1.png" alt="Zara Perfume" loading="lazy">
                </div>
                <div class="product-info">
                    <p class="product-name">Zara Perfume</p>
                    <p class="product-price">₦15,500</p>
                </div>
                <button class="add-to-cart-btn">ADD TO CART</button>
            </div>

        </div>
    </section>

    <hr class="section-divider">

    <!-- ======= NEW ARRIVALS ======= -->
    <section class="products-section" id="new-arrivals">
        <h2 class="section-title">NEW ARRIVALS</h2>
        <div class="products-grid">

            <div class="product-card" id="product-4">
                <div class="product-image">
                    <img src="jo malone 2 1.png" alt="Jo Malone" loading="lazy">
                </div>
                <div class="product-info">
                    <p class="product-name">Jo Malone</p>
                    <p class="product-price">₦18,000</p>
                </div>
                <button class="add-to-cart-btn">ADD TO CART</button>
            </div>

            <div class="product-card" id="product-5">
                <div class="product-image">
                    <img src="prada milano 3.png" alt="Prada Milano" loading="lazy">
                </div>
                <div class="product-info">
                    <p class="product-name">Prada Milano</p>
                    <p class="product-price">₦26,000</p>
                </div>
                <button class="add-to-cart-btn">ADD TO CART</button>
            </div>

            <div class="product-card" id="product-6">
                <div class="product-image">
                    <img src="zara perfume 3 1.png" alt="Zara Perfume" loading="lazy">
                </div>
                <div class="product-info">
                    <p class="product-name">Zara Perfume</p>
                    <p class="product-price">₦12,500</p>
                </div>
                <button class="add-to-cart-btn">ADD TO CART</button>
            </div>

        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
